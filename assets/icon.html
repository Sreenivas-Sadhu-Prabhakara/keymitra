<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #20223B; }
  body { display: grid; place-items: center; }
  /* ~12% safe padding on each side -> mark fills the middle ~76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <!-- a letterform composed from a sound: the Devanagari top-bar (शिरोरेखा),
       a downstroke curling into a bowl, and a marigold vowel dot -->
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <line x1="8" y1="10" x2="24" y2="10" stroke="#E9812E" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M10.5 10 v7 a5.5 5.5 0 0 0 11 0 v-7" fill="none" stroke="#FAF7F2" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="24" cy="23" r="2.1" fill="#E9812E"/>
  </svg>
</body>
</html>
